## Azure Container Apps deployment configuration
##
## Prerequisites:
##   1. Azure CLI: az login
##   2. Resource group: az group create --name bloomy-mcp-rg --location eastus
##   3. Container Apps environment: az containerapp env create --name bloomy-mcp-env --resource-group bloomy-mcp-rg --location eastus
##
## Build and deploy:
##   az containerapp up \
##     --name bloomy-mcp \
##     --resource-group bloomy-mcp-rg \
##     --environment bloomy-mcp-env \
##     --source . \
##     --target-port 8000 \
##     --ingress external \
##     --min-replicas 0 \
##     --max-replicas 3 \
##     --env-vars \
##       MCP_TRANSPORT=streamable-http \
##       HOST=0.0.0.0 \
##       PORT=8000 \
##       BLOOM_API_URL=secretref:bloom-api-url \
##       BLOOM_API_TOKEN=secretref:bloom-api-token \
##       MCP_API_KEY=secretref:mcp-api-key
##
## Set secrets (do this before first deploy):
##   az containerapp secret set \
##     --name bloomy-mcp \
##     --resource-group bloomy-mcp-rg \
##     --secrets \
##       bloom-api-url=<your-bloom-api-url> \
##       bloom-api-token=<your-bloom-api-token> \
##       mcp-api-key=<your-chosen-api-key>
##
## Cloudflare DNS setup:
##   1. Get the Container App FQDN:
##      az containerapp show --name bloomy-mcp --resource-group bloomy-mcp-rg --query properties.configuration.ingress.fqdn -o tsv
##   2. In Cloudflare DNS, add a CNAME record:
##      mcp.yourdomain.com -> <fqdn-from-step-1>
##      Proxy status: Proxied (orange cloud)
##
## Copilot Studio registration:
##   Server URL: https://mcp.yourdomain.com/mcp
##   Auth type: API Key
##   Header name: X-API-Key
##   Key value: <your-chosen-api-key>

properties:
  configuration:
    ingress:
      external: true
      targetPort: 8000
      transport: http
    secrets:
      - name: bloom-api-url
        value: ""
      - name: bloom-api-token
        value: ""
      - name: mcp-api-key
        value: ""
  template:
    containers:
      - name: bloomy-mcp
        image: bloomy-mcp:latest
        resources:
          cpu: 0.25
          memory: 0.5Gi
        env:
          - name: MCP_TRANSPORT
            value: streamable-http
          - name: HOST
            value: "0.0.0.0"
          - name: PORT
            value: "8000"
          - name: BLOOM_API_URL
            secretRef: bloom-api-url
          - name: BLOOM_API_TOKEN
            secretRef: bloom-api-token
          - name: MCP_API_KEY
            secretRef: mcp-api-key
    scale:
      minReplicas: 0
      maxReplicas: 3
      rules:
        - name: http-rule
          http:
            metadata:
              concurrentRequests: "10"
